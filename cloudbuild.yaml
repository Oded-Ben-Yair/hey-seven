# ---------------------------------------------------------------------------
# Staging Strategy ADR
# ---------------------------------------------------------------------------
# CURRENT (MVP): Single-environment pipeline. Smoke test gate validates
#   health + version + agent_ready before routing traffic (Step 7-8).
# PLANNED (production): Branch-based staging via Cloud Build triggers:
#   - Push to main -> deploy to staging Cloud Run service
#   - Tag vX.Y.Z -> promote staging image to production Cloud Run service
#   - Staging runs full E2E test suite (not just smoke test)
#   - Promotion requires manual approval via Cloud Build approval gates
# WHY NOT YET: Single demo environment, one developer, no staging GCP project.
# ---------------------------------------------------------------------------
steps:
  # Step 1: Install dependencies and run tests + lint
  # R37 fix D6-m1: Per-step timeout prevents hung steps from blocking the pipeline.
  - name: 'python:3.12.8-slim-bookworm@sha256:8ef40398b663cf0a3a4685ad0ffcf924282e4c954283b33b7765eae0856d7e0c'
    entrypoint: 'bash'
    timeout: '600s'
    args:
      - '-c'
      - |
        pip install --no-cache-dir -r requirements-dev.txt
        ruff check src/ tests/
        mypy src/ --ignore-missing-imports
        python -m pytest tests/ -v --tb=short -x \
          --ignore=tests/test_eval.py \
          --cov=src --cov-fail-under=90

  # Step 1b: Dependency audit (pip-audit) — BLOCKING: fails pipeline on vulnerabilities
  # R68 fix D6: Supply chain security per ADR-021 and NIST SP 800-218.
  # Runs after tests (dependencies already installed) to avoid duplicate pip install.
  - name: 'python:3.12.8-slim-bookworm@sha256:8ef40398b663cf0a3a4685ad0ffcf924282e4c954283b33b7765eae0856d7e0c'
    entrypoint: 'bash'
    timeout: '120s'
    args:
      - '-c'
      - |
        pip install --no-cache-dir pip-audit
        pip-audit -r requirements-prod.txt --strict --desc

  # Step 2: Build Docker image (Artifact Registry, not deprecated gcr.io)
  - name: 'gcr.io/cloud-builders/docker'
    timeout: '300s'
    args: ['build', '-t', 'us-central1-docker.pkg.dev/$PROJECT_ID/hey-seven/hey-seven:$COMMIT_SHA', '.']

  # Step 3: Trivy container vulnerability scan (pinned version for reproducible builds)
  - name: 'aquasec/trivy:0.58.2'
    timeout: '300s'
    args:
      - 'image'
      - '--severity=CRITICAL,HIGH'
      - '--exit-code=1'
      - '--ignore-unfixed'
      - '--no-progress'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/hey-seven/hey-seven:$COMMIT_SHA'

  # Step 3b: Generate SBOM (CycloneDX format) for supply chain transparency
  # R41 fix D6-M001: SBOM generation per NIST SP 800-218 / EO 14028.
  # Uses Trivy's built-in CycloneDX output (no extra tool installation).
  - name: 'aquasec/trivy:0.58.2'
    timeout: '120s'
    args:
      - 'image'
      - '--format=cyclonedx'
      - '--output=/workspace/sbom.json'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/hey-seven/hey-seven:$COMMIT_SHA'

  # Step 4: Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    timeout: '120s'
    args: ['push', 'us-central1-docker.pkg.dev/$PROJECT_ID/hey-seven/hey-seven:$COMMIT_SHA']

  # Step 4b: Install cosign binary (pinned v2.4.1 for reproducible builds)
  # R46 fix D6: Implements image signing ADR (R41 D6-M002) with GCP KMS key.
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    timeout: '120s'
    args:
      - '-c'
      - |
        curl -Lo /workspace/cosign https://github.com/sigstore/cosign/releases/download/v2.4.1/cosign-linux-amd64
        echo "8b24b946dd5809c6bd93de08033bcf6bc0ed7d336b7785787c080f574b89249b  /workspace/cosign" | sha256sum -c
        chmod +x /workspace/cosign

  # Step 4c: Sign image with GCP KMS key (tamper-evidence)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    timeout: '120s'
    args:
      - '-c'
      - |
        /workspace/cosign sign \
          --key gcpkms://projects/$PROJECT_ID/locations/us-central1/keyRings/hey-seven-signing/cryptoKeys/cosign-key \
          --yes \
          us-central1-docker.pkg.dev/$PROJECT_ID/hey-seven/hey-seven:$COMMIT_SHA

  # Step 4d: Attest SBOM (CycloneDX format, links SBOM to signed image)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    timeout: '120s'
    args:
      - '-c'
      - |
        /workspace/cosign attest \
          --predicate /workspace/sbom.json \
          --type cyclonedx \
          --key gcpkms://projects/$PROJECT_ID/locations/us-central1/keyRings/hey-seven-signing/cryptoKeys/cosign-key \
          --yes \
          us-central1-docker.pkg.dev/$PROJECT_ID/hey-seven/hey-seven:$COMMIT_SHA

  # Step 4e: Verify signature inline (fail pipeline if signing failed)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    timeout: '60s'
    args:
      - '-c'
      - |
        /workspace/cosign verify \
          --key gcpkms://projects/$PROJECT_ID/locations/us-central1/keyRings/hey-seven-signing/cryptoKeys/cosign-key \
          us-central1-docker.pkg.dev/$PROJECT_ID/hey-seven/hey-seven:$COMMIT_SHA

  # Step 5: Capture current revision for rollback
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    timeout: '120s'
    args:
      - '-c'
      - |
        gcloud run revisions list --service=hey-seven --region=us-central1 \
          --format='value(REVISION)' --limit=1 > /workspace/previous-revision.txt 2>/dev/null || echo "none" > /workspace/previous-revision.txt
        echo "Previous revision: $(cat /workspace/previous-revision.txt)"

  # Step 6: Deploy to Cloud Run with --no-traffic (canary-safe)
  # --allow-unauthenticated is defense-in-depth: Cloud Run allows public access,
  # while the app layer enforces API key auth via ApiKeyMiddleware + hmac.compare_digest.
  # This avoids requiring IAM tokens for the demo while maintaining app-level access
  # control. Webhooks (/sms/webhook, /cms/webhook) have their own signature verification.
  # Production hardening path: Cloud Run IAM + API Gateway for external-facing endpoints.
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    timeout: '300s'
    args:
      - 'run'
      - 'deploy'
      - 'hey-seven'
      - '--image=us-central1-docker.pkg.dev/$PROJECT_ID/hey-seven/hey-seven:$COMMIT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--memory=2Gi'
      - '--cpu=2'
      - '--timeout=180s'  # SSE_TIMEOUT(60s) + graceful_shutdown(15s) + LLM_pipeline(6_calls*15s) + buffer
      - '--concurrency=50'  # SSE streams hold connections; 50 concurrent per instance with asyncio
      - '--no-traffic'  # Deploy without routing traffic; smoke test validates first
      - '--set-secrets=GOOGLE_API_KEY=google-api-key:latest,API_KEY=hey-seven-api-key:latest,CMS_WEBHOOK_SECRET=cms-webhook-secret:latest,TELNYX_PUBLIC_KEY=telnyx-public-key:latest,REDIS_URL=hey-seven-redis-url:latest'
      - '--set-env-vars=ENVIRONMENT=production,LOG_LEVEL=INFO,VERSION=$COMMIT_SHA,STATE_BACKEND=redis'
      - '--vpc-connector=hey-seven-vpc'  # Required for Cloud Memorystore (Redis) access
      - '--cpu-boost'  # Full CPU during startup for faster cold start
      - '--min-instances=1'  # Keep one warm instance to avoid cold-start latency
      - '--max-instances=10'  # Cap scaling to prevent DDoS-driven cost runaway
      # Cloud Run HTTP probes (Dockerfile HEALTHCHECK is ignored by Cloud Run).
      # Startup probe: wait for agent + RAG initialization before routing traffic.
      # Liveness probe: detect deadlocked containers (blocked event loop, stuck CB).
      - '--startup-probe-path=/health'
      - '--startup-probe-period=10'
      - '--startup-probe-failure-threshold=6'
      - '--liveness-probe-path=/live'
      - '--liveness-probe-period=30'

  # Step 7: Post-deploy smoke test — validate before routing traffic
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    timeout: '300s'
    args:
      - '-c'
      - |
        echo "Waiting 30s for container startup..."
        sleep 30
        SERVICE_URL=$(gcloud run services describe hey-seven --region=us-central1 --format='value(status.url)')
        echo "Service URL: $SERVICE_URL"
        # Health check with retries (cold start may take up to 60s)
        for i in 1 2 3; do
          STATUS=$(curl -s -o /tmp/health.json -w '%{http_code}' "$SERVICE_URL/health" --max-time 15)
          echo "Attempt $i: /health returned HTTP $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "Health response: $(cat /tmp/health.json)"
            # Verify version matches deployed commit
            DEPLOYED_VERSION=$(cat /tmp/health.json | python3 -c "import sys,json; print(json.load(sys.stdin).get('version',''))" 2>/dev/null)
            echo "Deployed version: $DEPLOYED_VERSION, Expected: $COMMIT_SHA"
            if [ -n "$DEPLOYED_VERSION" ] && [ "$DEPLOYED_VERSION" != "$COMMIT_SHA" ]; then
              echo "VERSION MISMATCH: deployed=$DEPLOYED_VERSION expected=$COMMIT_SHA"
              echo "Stale container may be serving old code. Failing smoke test."
              STATUS="version_mismatch"
            fi
            # Functional check: verify agent graph compiled successfully.
            # agent_ready=false means the LangGraph StateGraph failed to compile
            # (missing nodes, broken wiring) — the container is up but non-functional.
            AGENT_READY=$(cat /tmp/health.json | python3 -c "import sys,json; print(json.load(sys.stdin).get('agent_ready', False))" 2>/dev/null)
            echo "Agent ready: $AGENT_READY"
            if [ "$AGENT_READY" != "True" ]; then
              echo "SMOKE TEST FAILED: agent not ready (agent_ready=$AGENT_READY)"
              echo "Graph compilation may have failed. Check container logs."
              STATUS="agent_not_ready"
            fi
            break
          fi
          echo "Retrying in 15s..."
          sleep 15
        done
        if [ "$STATUS" != "200" ]; then
          echo "SMOKE TEST FAILED: /health returned $STATUS after 3 attempts (version_mismatch = stale container)"
          echo "Rolling back to previous revision..."
          PREV=$(cat /workspace/previous-revision.txt)
          if [ "$PREV" != "none" ]; then
            gcloud run services update-traffic hey-seven --region=us-central1 --to-revisions=$PREV=100
            echo "Rolled back to $PREV — verifying rollback health..."
            sleep 15
            for j in 1 2 3; do
              RB_STATUS=$(curl -s -o /dev/null -w '%{http_code}' "$SERVICE_URL/health" --max-time 15)
              echo "Rollback health attempt $j: HTTP $RB_STATUS"
              if [ "$RB_STATUS" = "200" ]; then
                echo "Rollback verified: $PREV is healthy"
                break
              fi
              sleep 10
            done
            if [ "$RB_STATUS" != "200" ]; then
              echo "CRITICAL: Rollback to $PREV also unhealthy (HTTP $RB_STATUS). Manual intervention required."
            fi
          fi
          exit 1
        fi

  # Step 8: Canary traffic splitting with monitoring-based rollback
  # R46 fix D6: Graduated rollout (10% -> 50% -> 100%) with error rate checks.
  # Replaces instant --to-latest. Rolls back to previous revision if 5xx rate > 5%.
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    timeout: '600s'
    args:
      - '-c'
      - |
        # --- Error rate check function (reused at each canary stage) ---
        check_error_rate() {
          local STAGE="$1"
          echo "[$STAGE] Waiting 60s to collect error metrics..."
          sleep 60
          ERROR_COUNT=$(gcloud monitoring time-series list \
            --project=$PROJECT_ID \
            --filter='metric.type="run.googleapis.com/request_count" AND resource.labels.service_name="hey-seven" AND metric.labels.response_code_class="5xx"' \
            --interval-start-time=$(date -u -d '60 seconds ago' +%Y-%m-%dT%H:%M:%SZ) \
            --format='value(points.value.int64Value)' 2>/dev/null | paste -sd+ - | bc 2>/dev/null || echo 0)
          TOTAL_COUNT=$(gcloud monitoring time-series list \
            --project=$PROJECT_ID \
            --filter='metric.type="run.googleapis.com/request_count" AND resource.labels.service_name="hey-seven"' \
            --interval-start-time=$(date -u -d '60 seconds ago' +%Y-%m-%dT%H:%M:%SZ) \
            --format='value(points.value.int64Value)' 2>/dev/null | paste -sd+ - | bc 2>/dev/null || echo 0)
          if [ "$TOTAL_COUNT" -gt 0 ]; then
            ERROR_RATE=$(echo "scale=2; $ERROR_COUNT * 100 / $TOTAL_COUNT" | bc)
          else
            ERROR_RATE=0
          fi
          echo "[$STAGE] Error rate: ${ERROR_RATE}% (${ERROR_COUNT}/${TOTAL_COUNT})"
          THRESHOLD=5
          if [ "$(echo "$ERROR_RATE > $THRESHOLD" | bc -l 2>/dev/null || echo 0)" -eq 1 ]; then
            echo "[$STAGE] ERROR RATE ${ERROR_RATE}% exceeds threshold ${THRESHOLD}%. Rolling back..."
            PREV=$(cat /workspace/previous-revision.txt)
            if [ "$PREV" != "none" ]; then
              gcloud run services update-traffic hey-seven --region=us-central1 --to-revisions=$PREV=100
              echo "Rolled back to $PREV"
            fi
            exit 1
          fi
          echo "[$STAGE] Error rate OK — proceeding."
        }

        # --- Stage 1: 10% traffic to new revision ---
        echo "=== Canary Stage 1: Routing 10% traffic to new revision ==="
        gcloud run services update-traffic hey-seven --region=us-central1 --to-revisions=LATEST=10
        check_error_rate "10%"

        # --- Stage 2: 50% traffic ---
        echo "=== Canary Stage 2: Routing 50% traffic to new revision ==="
        gcloud run services update-traffic hey-seven --region=us-central1 --to-revisions=LATEST=50
        check_error_rate "50%"

        # --- Stage 3: 100% traffic ---
        echo "=== Canary Stage 3: Routing 100% traffic to new revision ==="
        gcloud run services update-traffic hey-seven --region=us-central1 --to-latest
        # R68 fix D6: Final error rate check at 100% traffic to catch issues
        # that only manifest under full load (e.g., cache stampede, connection
        # pool exhaustion). Without this, errors at 100% go undetected until
        # external monitoring fires.
        check_error_rate "100%"
        echo "=== Canary deployment complete: 100% traffic on new revision ==="

images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/hey-seven/hey-seven:$COMMIT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY
