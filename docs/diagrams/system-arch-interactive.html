<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hey Seven -- System Architecture</title>
  <link rel="stylesheet" href="https://esm.sh/@xyflow/react@12.10.0/dist/style.css">
  <style>
    /* === Reset & Base Dark Theme === */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; width: 100%; overflow: hidden; }
    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      font-size: 14px;
      line-height: 1.5;
    }
    #root { width: 100%; height: 100%; }

    /* === React Flow Dark Overrides === */
    .react-flow { background: #0d1117 !important; }
    .react-flow__background { background: #0d1117 !important; }
    .react-flow__minimap { background: #161b22 !important; border: 1px solid #30363d !important; border-radius: 6px !important; }
    .react-flow__controls { background: #161b22 !important; border: 1px solid #30363d !important; border-radius: 6px !important; }
    .react-flow__controls button { background: #161b22 !important; color: #e6edf3 !important; border-color: #30363d !important; }
    .react-flow__controls button:hover { background: #21262d !important; }
    .react-flow__controls button svg { fill: #e6edf3 !important; }
    .react-flow__edge-path { stroke: #484f58 !important; }
    .react-flow__edge-text { fill: #8b949e !important; }
    .react-flow__edge-textbg { fill: #0d1117 !important; }
    .react-flow__attribution { display: none !important; }

    /* === Custom Node === */
    .interactive-node {
      min-width: 160px;
      max-width: 260px;
      padding: 12px 16px;
      border-radius: 8px;
      border: 2px solid #30363d;
      background: #161b22;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease, opacity 0.3s ease;
      position: relative;
    }
    .interactive-node:hover {
      transform: scale(1.02);
    }
    .interactive-node.selected {
      border-color: #f39c12 !important;
      box-shadow: 0 0 15px rgba(243, 156, 18, 0.6);
    }
    .interactive-node.dimmed {
      opacity: 0.3;
    }
    .interactive-node.tour-active {
      border-color: #f39c12 !important;
      box-shadow: 0 0 20px rgba(243, 156, 18, 0.7);
    }
    .node-label {
      font-size: 13px;
      font-weight: 600;
      color: #e6edf3;
      text-align: center;
      word-wrap: break-word;
    }
    .node-badge {
      position: absolute;
      top: -8px;
      right: -8px;
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 2px 6px;
      border-radius: 10px;
      color: #fff;
      white-space: nowrap;
    }
    .node-group-icon {
      position: absolute;
      top: -8px;
      left: -8px;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #21262d;
      border: 1px solid #484f58;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      color: #8b949e;
      cursor: pointer;
    }

    /* === React Flow Handle Override === */
    .react-flow__handle {
      width: 8px !important;
      height: 8px !important;
      background: #484f58 !important;
      border: 1px solid #30363d !important;
    }

    /* === Detail Panel === */
    .detail-panel {
      position: fixed;
      top: 0;
      right: 0;
      width: 42vw;
      min-width: 400px;
      max-width: 640px;
      height: 100%;
      background: #161b22;
      border-left: 1px solid #30363d;
      z-index: 100;
      overflow-y: auto;
      transform: translateX(100%);
      transition: transform 0.3s ease;
      display: flex;
      flex-direction: column;
    }
    .detail-panel.open {
      transform: translateX(0);
    }
    .detail-panel-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 24px 24px 14px;
      border-bottom: 1px solid #30363d;
    }
    .detail-panel-title {
      font-size: 22px;
      font-weight: 700;
      color: #e6edf3;
      flex: 1;
      margin-right: 12px;
    }
    .detail-panel-close {
      width: 32px;
      height: 32px;
      border: none;
      background: #21262d;
      color: #8b949e;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s, color 0.2s;
    }
    .detail-panel-close:hover {
      background: #30363d;
      color: #e6edf3;
    }
    .detail-panel-body {
      padding: 20px 24px;
      flex: 1;
    }
    .detail-section {
      margin-bottom: 20px;
    }
    .detail-section-label {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #8b949e;
      margin-bottom: 8px;
    }
    .detail-section-text {
      font-size: 15px;
      color: #c9d1d9;
      line-height: 1.7;
    }
    .detail-code {
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 12px;
      overflow-x: auto;
      font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
      font-size: 12px;
      line-height: 1.5;
      color: #c9d1d9;
      white-space: pre;
      tab-size: 4;
    }
    .detail-filepath {
      font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
      font-size: 12px;
      color: #58a6ff;
      background: #0d1117;
      padding: 4px 8px;
      border-radius: 4px;
      border: 1px solid #30363d;
      display: inline-block;
    }
    .category-badge-detail {
      display: inline-block;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 3px 10px;
      border-radius: 12px;
      color: #fff;
    }

    /* === Guided Tour === */
    .tour-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 64px;
      background: #161b22;
      border-top: 1px solid #30363d;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 0 24px;
      transform: translateY(100%);
      transition: transform 0.3s ease;
    }
    .tour-bar.active {
      transform: translateY(0);
    }
    .tour-step-counter {
      font-size: 13px;
      font-weight: 600;
      color: #8b949e;
      min-width: 100px;
      text-align: center;
    }
    .tour-description {
      flex: 1;
      font-size: 14px;
      color: #e6edf3;
      text-align: center;
      max-width: 600px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .tour-btn {
      padding: 6px 16px;
      border-radius: 6px;
      border: 1px solid #30363d;
      background: #21262d;
      color: #e6edf3;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
      white-space: nowrap;
    }
    .tour-btn:hover {
      background: #30363d;
      border-color: #484f58;
    }
    .tour-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .tour-btn.primary {
      background: #1f6feb;
      border-color: #1f6feb;
    }
    .tour-btn.primary:hover {
      background: #388bfd;
    }
    .tour-btn.exit {
      background: transparent;
      border-color: #484f58;
      color: #8b949e;
    }

    /* === Start Tour Button === */
    .start-tour-btn {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 50;
      padding: 8px 16px;
      border-radius: 6px;
      border: 1px solid #30363d;
      background: #161b22;
      color: #e6edf3;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .start-tour-btn:hover {
      background: #21262d;
      border-color: #484f58;
    }

    /* === Diagram Title === */
    .diagram-title {
      position: fixed;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 50;
      font-size: 16px;
      font-weight: 700;
      color: #e6edf3;
      background: rgba(22, 27, 34, 0.85);
      padding: 6px 16px;
      border-radius: 6px;
      border: 1px solid #30363d;
      pointer-events: none;
      white-space: nowrap;
    }

    /* === Animated Edge === */
    @keyframes dash-flow {
      to { stroke-dashoffset: -20; }
    }
    .animated-edge-path {
      stroke-dasharray: 5 5;
      animation: dash-flow 0.6s linear infinite;
    }

    /* === Responsive === */
    @media (max-width: 768px) {
      .detail-panel { width: 100%; }
      .tour-description { display: none; }
    }
  </style>
</head>

        "details": "Three input channels feed the FastAPI backend:\n\n**Web Chat** (`static/index.html`): Vanilla HTML/JS chat widget using Server-Sent Events (SSE) for token-by-token streaming. Sends `POST /chat` with message + thread_id.\n\n**Telnyx SMS** (`src/sms/`): Inbound SMS webhook handler with TCPA/DNC compliance checking. Processes guest SMS messages and routes through the agent pipeline. Responses truncated to 160-char SMS segments via the persona envelope node.\n\n**Google Sheets CMS** (`src/cms/`): Webhook for content updates from Google Sheets. Allows property staff to update knowledge base content without code changes. Triggers re-ingestion when content changes.\n\nDesign: \"Build for one property, design for N\" -- all configuration externalized via pydantic-settings.",

        "category": "process",

        "details": "FastAPI backend with pure ASGI middleware stack (no BaseHTTPMiddleware -- it breaks SSE streaming).\n\n**Middleware stack** (outermost to innermost):\n1. SecurityHeadersMiddleware -- HSTS, CSP, X-Content-Type-Options\n2. RateLimitMiddleware -- Per-client distributed rate limiting via Redis sorted set sliding window (atomic Lua script)\n3. RequestBodyLimitMiddleware -- Body size guard\n4. ApiKeyMiddleware -- API key authentication\n5. RequestLoggingMiddleware -- Structured request/response logging\n6. ErrorHandlingMiddleware -- Catch-all error handling\n\n**Endpoints**: `/chat` (SSE), `/health`, `/live`, `/metrics` (P50/P95/P99 latency), `/property`, `/graph`, `/sms/webhook`, `/cms/webhook`\n\n**Lifespan**: On startup, builds the LangGraph StateGraph and ingests property data into ChromaDB. On shutdown, graceful stream draining (SIGTERM handler with drain timeout < Cloud Run SIGKILL timeout).\n\n**Cache-Control + ETag** on cacheable endpoints (`/property`, `/graph`, `/health`) for efficient CDN caching.",
        "codeSnippet": "# src/api/app.py\nfrom fastapi import FastAPI\nfrom sse_starlette.sse import EventSourceResponse\n\n# Pure ASGI middleware (NOT BaseHTTPMiddleware)\nfrom .middleware import (\n    ApiKeyMiddleware, ErrorHandlingMiddleware,\n    RateLimitMiddleware, RequestBodyLimitMiddleware,\n    RequestLoggingMiddleware, SecurityHeadersMiddleware,\n)",

      "id": "compliance-gate",

        "details": "Pre-router deterministic guardrail node. Zero LLM calls -- pure regex classification across 204 compiled patterns in 11 languages (EN, ES, PT, ZH, FR, VI, AR, JP, KO, Hindi, Tagalog).\n\n**5 guardrail layers** (priority order, first match wins):\n1. **Turn-limit guard**: If messages > MAX_MESSAGE_LIMIT (40), forces off_topic\n2. **Prompt injection** (`audit_input()`): 47 patterns (20 Latin + 27 non-Latin)\n3. **Responsible gaming** (`detect_responsible_gaming()`): 60 patterns across 10 languages\n4. **Age verification** (`detect_age_verification()`): 13 patterns incl. Hindi/Tagalog\n5. **BSA/AML** (`detect_bsa_aml()`): 47 patterns across 8 languages\n6. **Patron privacy** (`detect_patron_privacy()`): 18 patterns incl. Spanish/Tagalog\n7. **Crisis detection** (`detect_crisis()`): Graduated 4-level crisis escalation (ADR-025)\n8. **Grief/celebration** emotional context: Sets `guest_sentiment` pass-through annotation\n\nAll pass: `query_type=None` signals LLM router to classify. All patterns are re2-compatible (no backtracking, ReDoS-safe).\n\nStructured audit logging for every guardrail trigger (category, pattern matched, IP, timestamp).",
        "codeSnippet": "# src/agent/compliance_gate.py\ndef compliance_gate_node(state: PropertyQAState) -> dict:\n    # 204 compiled regex patterns, 11 languages\n    if detect_prompt_injection(user_input):\n        return {\"query_type\": \"injection\", \"confidence\": 1.0}\n    if detect_responsible_gaming(user_input):\n        return {\"query_type\": \"gambling_advice\", \"confidence\": 1.0}\n    # All pass -> query_type=None -> LLM router",

        "group": "graph-nodes",
        "details": "Classifies user intent into 7 categories using Gemini 2.5 Flash with Pydantic structured output.\n\n**Categories**: `property_qa`, `hours_schedule`, `greeting`, `off_topic`, `gambling_advice`, `action_request`, `ambiguous`.\n\nPlus 2 additional categories detected by compliance_gate upstream: `age_verification`, `patron_privacy` (9 total effective categories).\n\n**Implementation**: `llm.with_structured_output(RouterOutput)` produces `RouterOutput` Pydantic model with `query_type: Literal[...]` and `confidence: float` (0.0-1.0). No substring matching -- fully typed structured output.\n\n**VADER sentiment detection** with priority guard: If compliance_gate already set a priority sentiment (grief, celebration), VADER is skipped to prevent overwriting emotional context.\n\n**Routing rules**:\n- `greeting` -> greeting node\n- `off_topic/gambling/action` -> off_topic node\n- `confidence < 0.3` -> off_topic (low-confidence catch-all)\n- `property_qa/hours/ambiguous` -> retrieve node",

    {
      "id": "rag-retrieval",
      "type": "interactive",

        "label": "RAG Retrieval (RRF + ChromaDB)",
        "category": "data",
        "group": "rag",
        "details": "Multi-strategy retrieval with Reciprocal Rank Fusion (RRF) from ChromaDB vector store.\n\n**Retrieval strategies**:\n- `search_knowledge_base()`: (1) direct semantic search + (2) entity-augmented search (`{query} name location details`)\n- `search_hours()`: (1) schedule-augmented search + (2) direct semantic search\n\n**RRF fusion**: `sum(1/(k + rank))` across rankings (k=60 per original paper). Documents in multiple lists get boosted. Uses SHA-256 of content+source for document identity.\n\n**Ingestion** (`ingest.py` / `src/rag/pipeline.py`):\n- Per-item chunking for structured data (NOT text splitters)\n- SHA-256 content hashing for idempotent ingestion\n- Version-stamp purging for stale chunks (`_ingestion_version` metadata)\n- Category-specific formatters for richer embeddings\n- Pinned embedding model: `text-embedding-004`\n\n**Cosine similarity** with `RAG_MIN_RELEVANCE_SCORE=0.3` threshold. ChromaDB for local dev; Vertex AI Vector Search for production.\n\n**Gambling slang normalization** (`src/agent/slang.py`): Normalizes casino slang (\"comp me\", \"whale\", \"YOLO'd\") before search for better retrieval.",
        "codeSnippet": "# src/rag/reranking.py\ndef _rerank_by_rrf(result_lists, top_k=5, k=60):\n    rrf_scores = {}\n    for results in result_lists:\n        for rank, (doc, score) in enumerate(results):\n            doc_id = hashlib.sha256(content+source).hexdigest()\n            rrf_scores[doc_id] += 1.0 / (k + rank + 1)\n    return sorted by rrf_scores[:top_k]",

        "category": "process",
        "group": "graph-nodes",
        "details": "Silent background LLM that guides the speaking agent without generating guest-facing text.\n\nAnalyzes conversation context and guest profile completeness, then produces a structured `WhisperPlan`:\n- `next_topic`: Which profiling topic to explore naturally (dining, party_size, offer_ready, etc.)\n- `extraction_targets`: Specific data points to extract (kids_ages, dietary_restrictions)\n- `offer_readiness`: Float 0.0-1.0 indicating readiness for personalized offer\n- `conversation_note`: Brief tactical note for the speaking agent\n\n**Fail-silent contract**: Any LLM failure returns `{\"whisper_plan\": None}` -- the agent proceeds without guidance. Never crashes the pipeline.\n\n**Cost**: ~$0.0003/turn at Gemini 2.5 Flash pricing. Configurable via `whisper_planner_enabled` feature flag.\n\nThe whisper plan is injected into the specialist agent's context as internal guidance -- the guest never sees it.",
        "codeSnippet": "# src/agent/whisper_planner.py\nclass WhisperPlan(BaseModel):\n    next_topic: Literal[\"dining\", \"party_size\", \"entertainment\",\n                        \"hotel\", \"spa\", \"gaming\", \"offer_ready\", ...]\n    extraction_targets: list[str]\n    offer_readiness: float = Field(ge=0.0, le=1.0)\n    conversation_note: str\n\n# Fail-silent: any error -> {\"whisper_plan\": None}",

        "group": "specialists",
        "details": "Five specialist agents share a common `execute_specialist()` base function via dependency injection:\n\n| Agent | Categories | Focus |\n|-------|-----------|-------|\n| **Host** | General | Concierge with whisper planner guidance |\n| **Dining** | restaurants | Menu/hours/cuisine domain prompts |\n| **Entertainment** | entertainment, spa | Shows, events, spa services |\n| **Comp** | gaming, promotions | Table games, loyalty programs, comp offers |\n| **Hotel** | hotel | Rooms, suites, check-in/out |\n\n**Dispatch**: `DispatchOutput` Pydantic model routes to the correct specialist. Tie-breaking uses three-tuple key: `(count, business_priority, alphabetical)`. Business priority: dining (4) > hotel (3) > entertainment (2) > gaming (1).\n\n**Shared `_base.py`** handles:\n- Circuit breaker checks (fail-open with safe fallback)\n- System prompt construction via `string.Template.safe_substitute()`\n- Retrieved context formatting and injection\n- Whisper planner guidance (host agent only)\n- Retry feedback injection\n- Sliding window on conversation history (last 20 messages)\n- Error handling with `skip_validation=True`\n\n**Profiling enrichment** (`src/agent/profiling.py`): Runs between generate and validate. LLM-powered extraction of guest attributes (party_size, dining preferences, budget signals) with confidence gating.",
        "codeSnippet": "# src/agent/agents/_base.py\nasync def execute_specialist(\n    state: PropertyQAState,\n    agent_config: AgentConfig,\n    get_llm_fn: Callable,     # DI: preserves test mock paths\n    get_cb_fn: Callable,      # DI: circuit breaker per agent\n) -> dict:\n    cb = get_cb_fn()\n    if cb.is_open:\n        return {\"messages\": [AIMessage(content=FALLBACK)], \"skip_validation\": True}",

        "codeSnippet": "# src/agent/state.py\nclass ValidationResult(BaseModel):\n    status: Literal[\"PASS\", \"FAIL\", \"RETRY\"]\n    reason: str\n\n# src/agent/nodes.py (validate_node)\nif state.get(\"skip_validation\"):\n    return {\"validation_result\": \"PASS\"}\nif retry_count < 1:\n    return {\"validation_result\": \"RETRY\", \"retry_feedback\": result.reason}\nreturn {\"validation_result\": \"FAIL\"}",

    const CATEGORY_COLORS = {
      trigger:  { bg: '#1e3a5f', border: '#3498db', badge: '#2980b9' },
      data:     { bg: '#1a3a4f', border: '#3498db', badge: '#2980b9' },

    // =============================================
    // Simple Markdown → HTML renderer
    // Handles: **bold**, `code`, tables, lists, paragraphs
    // =============================================
    function renderMarkdown(text) {
      if (!text) return '';
      var lines = text.split('\n');
      var result = [];
      var i = 0;

      while (i < lines.length) {
        var line = lines[i];
        var trimmed = line.trim();

        // Table row: starts and ends with |
        if (trimmed.match(/^\|.*\|$/)) {
          var tableHtml = '<table style="width:100%;border-collapse:collapse;margin:10px 0;font-size:14px;">';
          var isHeader = true;
          while (i < lines.length && lines[i].trim().match(/^\|.*\|$/)) {
            var row = lines[i].trim();
            // Skip separator rows (|---|---|)
            if (row.match(/^\|[\s\-:]+\|$/)) { i++; isHeader = false; continue; }
            var cells = row.split('|').slice(1, -1);
            var tag = isHeader ? 'th' : 'td';
            var style = isHeader
              ? 'padding:8px 12px;border:1px solid #30363d;background:#21262d;text-align:left;font-weight:600;color:#e6edf3;'
              : 'padding:8px 12px;border:1px solid #30363d;color:#c9d1d9;';
            tableHtml += '<tr>';
            cells.forEach(function(cell) {
              tableHtml += '<' + tag + ' style="' + style + '">' + inlineMarkdown(cell.trim()) + '</' + tag + '>';
            });
            tableHtml += '</tr>';
            if (isHeader) isHeader = false;
            i++;
          }
          tableHtml += '</table>';
          result.push(tableHtml);
          continue;
        }

        // Bullet list item
        if (trimmed.match(/^[-*]\s/)) {
          result.push('<div style="padding-left:16px;margin:3px 0;position:relative;">'
            + '<span style="position:absolute;left:0;color:#8b949e;">•</span>'
            + inlineMarkdown(trimmed.replace(/^[-*]\s/, ''))
            + '</div>');
          i++;
          continue;
        }

        // Empty line
        if (trimmed === '') {
          result.push('<div style="height:8px;"></div>');
          i++;
          continue;
        }

        // Regular paragraph
        result.push('<div style="margin:4px 0;line-height:1.6;">' + inlineMarkdown(trimmed) + '</div>');
        i++;
      }

      return result.join('');
    }

    // Inline markdown: **bold**, `code`
    function inlineMarkdown(text) {
      return text
        .replace(/\*\*(.+?)\*\*/g, '<strong style="color:#e6edf3;">$1</strong>')
        .replace(/`([^`]+)`/g, '<code style="background:#0d1117;padding:1px 5px;border-radius:3px;font-size:12px;color:#79c0ff;font-family:monospace;">$1</code>');
    }

    // =============================================
    // InteractiveNode Component
    // =============================================
    function InteractiveNode({ id, data, selected }) {
      const colors = getCategoryColor(data.category);
      const isTourActive = data._tourActive || false;
      const isDimmed = data._dimmed || false;

      const nodeClasses = [
        'interactive-node',
        selected ? 'selected' : '',
        isDimmed ? 'dimmed' : '',
        isTourActive ? 'tour-active' : '',
      ].filter(Boolean).join(' ');

      const nodeStyle = {
        background: colors.bg,
        borderColor: (selected || isTourActive) ? '#f39c12' : colors.border,
      };

      return h('div', { className: nodeClasses, style: nodeStyle },
        // Top handle
        h(Handle, { type: 'target', position: Position.Top, style: { background: colors.border } }),
        // Group icon
        data.isGroup ? h('div', { className: 'node-group-icon' }, data._collapsed ? '+' : '-') : null,
        // Category badge
        h('span', {
          className: 'node-badge',
          style: { background: colors.badge }
        }, data.category),
        // Label
        h('div', { className: 'node-label' }, data.label),
        // Bottom handle
        h(Handle, { type: 'source', position: Position.Bottom, style: { background: colors.border } })
      );
    }

    // =============================================
    // AnimatedEdge Component
    // =============================================
    function AnimatedEdge({
      id, sourceX, sourceY, targetX, targetY,
      sourcePosition, targetPosition, style, label, markerEnd
    }) {
      const [edgePath, labelX, labelY] = getBezierPath({
        sourceX, sourceY, sourcePosition,
        targetX, targetY, targetPosition,
      });

      const isAnimated = style && style.animated !== false;
      const isDashed = style && style.strokeDasharray;

      return h('g', null,
        h('path', {
          id: id,
          className: isAnimated ? 'animated-edge-path' : '',
          d: edgePath,
          fill: 'none',
          stroke: (style && style.stroke) || '#484f58',
          strokeWidth: (style && style.strokeWidth) || 2,
          strokeDasharray: isDashed ? style.strokeDasharray : (isAnimated ? '5 5' : undefined),
          markerEnd: markerEnd,
        }),
        label ? h('g', { transform: `translate(${labelX}, ${labelY})` },
          h('rect', {
            x: -((label.length * 6.5 + 16) / 2),
            y: -10,
            width: label.length * 6.5 + 16,
            height: 20,
            rx: 4,
            fill: '#0d1117',
            stroke: '#30363d',
            strokeWidth: 1,
          }),
          h('text', {
            style: {
              fontSize: '11px',
              fill: '#8b949e',
              fontFamily: '-apple-system, BlinkMacSystemFont, sans-serif',
            },
            textAnchor: 'middle',
            dominantBaseline: 'central',
          }, label)
        ) : null
      );
    }

    // =============================================
    // DetailPanel Component
    // =============================================
    function DetailPanel({ node, onClose }) {
      if (!node) {
        return h('div', { className: 'detail-panel' });

            className: 'detail-panel-close',

          ) : null,

          d.codeSnippet ? h('div', { className: 'detail-section' },

          ) : null,
          // Step narration (rendered markdown)
          d.stepIndex ? h('div', { className: 'detail-section' },
            h('div', { className: 'detail-section-label' }, 'Step ' + d.stepIndex + ' of Tour'),
            h('div', {
              className: 'detail-section-text',
              dangerouslySetInnerHTML: { __html: renderMarkdown(d.stepDescription || '') }
            })
          ) : null
        )
      );

    // =============================================
    // GuidedTour Component
    // =============================================
    function GuidedTour({ stepNodes, currentStep, onStepChange, onExit, tourActive, onStartTour }) {
      const totalSteps = stepNodes.length;
      const currentStepNode = stepNodes[currentStep - 1];
      const description = currentStepNode ? currentStepNode.data.stepDescription || '' : '';

      // Keyboard navigation
      useEffect(function () {
        if (!tourActive) return;
        function handleKey(e) {
          if (e.key === 'ArrowRight' && currentStep < totalSteps) {
            onStepChange(currentStep + 1);
          } else if (e.key === 'ArrowLeft' && currentStep > 1) {
            onStepChange(currentStep - 1);
          } else if (e.key === 'Escape') {
            onExit();
          }
        }
        window.addEventListener('keydown', handleKey);
        return function () { window.removeEventListener('keydown', handleKey); };
      }, [tourActive, currentStep, totalSteps, onStepChange, onExit]);

      // Start Tour button (shown when tour is not active)
      if (!tourActive && totalSteps > 0) {
        return h('button', {
          className: 'start-tour-btn',
          onClick: onStartTour,
        }, '\u25B6 Start Tour (' + totalSteps + ' steps)');
      }

      if (!tourActive || totalSteps === 0) return null;

      return h('div', { className: 'tour-bar active' },
        h('button', {
          className: 'tour-btn exit',
          onClick: onExit,
        }, 'Exit'),
        h('button', {
          className: 'tour-btn',
          onClick: function () { onStepChange(currentStep - 1); },
          disabled: currentStep <= 1,
        }, '\u2190 Prev'),
        h('span', { className: 'tour-step-counter' },
          'Step ' + currentStep + ' of ' + totalSteps
        ),
        h('span', { className: 'tour-description' }, description),
        h('button', {
          className: 'tour-btn primary',
          onClick: function () { onStepChange(currentStep + 1); },
          disabled: currentStep >= totalSteps,
        }, 'Next \u2192')
      );
    }

    // =============================================
    // Register custom node/edge types (stable refs, before components)
    // =============================================
    const nodeTypes = { interactive: InteractiveNode };
    const edgeTypes = { animated: AnimatedEdge };

    // =============================================
    // App Component
    // =============================================
    function FlowCanvas() {
      const diagramData = window.__DIAGRAM_DATA__ || { nodes: [], edges: [], meta: {} };
      const { fitView, setCenter } = useReactFlow();

      const [selectedNode, setSelectedNode] = useState(null);
      const [currentStep, setCurrentStep] = useState(1);
      const [tourActive, setTourActive] = useState(false);

      // Ref to hold step nodes — breaks circular dependency with useEffect
      const stepNodesRef = useRef([]);

      // Initialize nodes and edges from data
      const initialNodes = useMemo(function () {
        return (diagramData.nodes || []).map(function (n) {
          return Object.assign({}, n, {
            type: n.type || 'interactive',
            data: Object.assign({}, n.data, {
              _tourActive: false,
              _dimmed: false,
            }),
          });
        });
      }, []);

      const initialEdges = useMemo(function () {
        return (diagramData.edges || []).map(function (e) {
          return Object.assign({}, e, {
            type: e.type || 'animated',
            style: Object.assign({}, e.style || {}, {
              animated: e.animated !== false,
            }),
          });
        });
      }, []);

      const [nodes, setNodes, onNodesChange] = useNodesState(initialNodes);
      const [edges, setEdges, onEdgesChange] = useEdgesState(initialEdges);

      // Get step nodes sorted by stepIndex — also update ref for useEffect
      const stepNodes = useMemo(function () {
        var sorted = nodes
          .filter(function (n) { return n.data && n.data.stepIndex; })
          .sort(function (a, b) { return a.data.stepIndex - b.data.stepIndex; });
        stepNodesRef.current = sorted;
        return sorted;
      }, [nodes]);

      // Update node tour state when step changes
      // IMPORTANT: Only depend on [tourActive, currentStep] — NOT stepNodes
      // stepNodes derives from nodes, and this effect modifies nodes via setNodes.
      // Including stepNodes would create: setNodes→nodes→stepNodes→effect→setNodes = infinite loop
      useEffect(function () {
        if (!tourActive) {
          // Only reset if nodes actually have tour state set
          setNodes(function (nds) {
            var needsReset = nds.some(function (n) { return n.data._tourActive || n.data._dimmed; });
            if (!needsReset) return nds; // bail out — return same ref, no re-render
            return nds.map(function (n) {
              return Object.assign({}, n, {
                data: Object.assign({}, n.data, {
                  _tourActive: false,
                  _dimmed: false,
                }),
              });
            });
          });
          return;
        }

        var activeNode = stepNodesRef.current[currentStep - 1];
        if (!activeNode) return;

        setNodes(function (nds) {
          return nds.map(function (n) {
            var isActive = n.id === activeNode.id;
            // Skip update if state already matches
            if (n.data._tourActive === isActive && n.data._dimmed === !isActive) return n;
            return Object.assign({}, n, {
              data: Object.assign({}, n.data, {
                _tourActive: isActive,
                _dimmed: !isActive,
              }),
            });
          });
        });

        // Auto-open detail panel for the active step node
        setSelectedNode(activeNode);

        // Auto-zoom to active node (offset left to account for detail panel)
        if (activeNode.position) {
          setTimeout(function () {
            setCenter(
              activeNode.position.x - 160,
              activeNode.position.y + 30,
              { zoom: 1.2, duration: 500 }
            );
          }, 50);
        }
      }, [tourActive, currentStep]);

      // Node click handler
      var onNodeClick = useCallback(function (event, node) {
        setSelectedNode(node);
      }, []);

      // Pane click to deselect
      var onPaneClick = useCallback(function () {
        setSelectedNode(null);
      }, []);

      // Tour controls
      var handleStepChange = useCallback(function (step) {
        if (step >= 1 && step <= stepNodes.length) {
          setCurrentStep(step);
        }
      }, [stepNodes.length]);

      var handleExitTour = useCallback(function () {
        setTourActive(false);
        setCurrentStep(1);
        setSelectedNode(null); // Close detail panel on tour exit
        setTimeout(function () { fitView({ duration: 500, padding: 0.1 }); }, 50);
      }, [fitView]);

      var handleStartTour = useCallback(function () {
        setTourActive(true);
        setCurrentStep(1);
      }, []);

      // Close detail panel
      var handleClosePanel = useCallback(function () {
        setSelectedNode(null);
      }, []);

      var meta = diagramData.meta || {};

      // MiniMap node color function
      var minimapNodeColor = useCallback(function (node) {
        var cat = node.data && node.data.category;
        var colors = getCategoryColor(cat);
        return colors.border;
      }, []);

      return h('div', { style: { width: '100%', height: '100%', position: 'relative' } },
        // Title
        meta.title ? h('div', { className: 'diagram-title' }, meta.title) : null,
        // React Flow canvas
        h(ReactFlow, {
          nodes: nodes,
          edges: edges,
          onNodesChange: onNodesChange,
          onEdgesChange: onEdgesChange,
          onNodeClick: onNodeClick,
          onPaneClick: onPaneClick,
          nodeTypes: nodeTypes,
          edgeTypes: edgeTypes,
          fitView: true,
          fitViewOptions: { padding: 0.15 },
          minZoom: 0.2,
          maxZoom: 3,
          proOptions: { hideAttribution: true },
          defaultEdgeOptions: { type: 'animated' },
        },
          h(Background, { color: '#21262d', gap: 20, size: 1 }),
          h(MiniMap, {
            nodeColor: minimapNodeColor,
            maskColor: 'rgba(13, 17, 23, 0.8)',
            style: { background: '#161b22' },
            position: 'bottom-right',
          }),
          h(Controls, { position: 'top-right', showInteractive: false })
        ),
        // Detail panel
        h(DetailPanel, {
          node: selectedNode,
          onClose: handleClosePanel,
        }),
        // Guided tour
        h(GuidedTour, {
          stepNodes: stepNodes,
          currentStep: currentStep,
          onStepChange: handleStepChange,
          onExit: handleExitTour,
          tourActive: tourActive,
          onStartTour: handleStartTour,
        })
      );
    }

    function App() {
      return h(ReactFlowProvider, null,
        h(FlowCanvas, null)
      );
    }

    // Mount
    const root = createRoot(document.getElementById('root'));
    root.render(h(App, null));
  </script>
</body>
</html>
