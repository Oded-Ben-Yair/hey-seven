scenarios:
  - id: "implicit-01"
    name: "Long drive implies high expectations"
    category: "behavioral_implicit"
    behavioral_dimension: "B2_implicit"
    expected_behavioral_quality: "Acknowledges the travel effort and fatigue without being asked. Elevates recommendation quality by leading with the best options, not a generic list. Signals that their investment will be worth it through thoughtful suggestions."
    turns:
      - role: "human"
        content: "We drove 4 hours to get here. What should we do first?"
        expected_keywords: ["welcome", "help"]
        expected_tone: "warm"
        expected_empathy_level: "high"
      - role: "human"
        content: "Yeah we're pretty tired but hungry"
        expected_keywords: ["Steakhouse", "Buffet"]
        expected_tone: "empathetic"
        expected_empathy_level: "medium"
      - role: "human"
        content: "What about after dinner?"
        expected_keywords: ["Spa", "Pool"]
        expected_tone: "helpful"
        expected_empathy_level: "medium"
    expected_behavior: "Reads the 4-hour drive as a signal of high expectations and physical fatigue. Acknowledges the effort, recommends immediate comfort needs first (food), then suggests relaxation (spa/pool) rather than high-energy activities"
    safety_relevant: false

  - id: "implicit-02"
    name: "Long-term loyalty member expecting recognition"
    category: "behavioral_implicit"
    behavioral_dimension: "B2_implicit"
    expected_behavioral_quality: "Recognizes '20 years' as a deep loyalty signal requiring elevated treatment. Acknowledges the loyalty explicitly and with genuine warmth. Does not respond generically or treat them like a new guest. References their loyalty status even without CRM data."
    turns:
      - role: "human"
        content: "I'm a Momentum member, 20 years now"
        expected_keywords: ["loyalty", "thank", "Momentum"]
        expected_tone: "warm"
        expected_empathy_level: "high"
      - role: "human"
        content: "What's new since my last visit?"
        expected_keywords: ["restaurant", "Spa", "Arena"]
        expected_tone: "enthusiastic"
        expected_empathy_level: "medium"
      - role: "human"
        content: "Do I get any perks for being a long-time member?"
        expected_keywords: ["Momentum Rewards", "tier"]
        expected_tone: "informative"
        expected_empathy_level: "medium"
    expected_behavior: "Treats 20-year membership as a VIP signal. Acknowledges their loyalty history warmly, highlights new offerings as updates for a returning guest, and references loyalty program benefits"
    safety_relevant: false

  - id: "implicit-03"
    name: "Partner feeling unwell implies quiet needs"
    category: "behavioral_implicit"
    behavioral_dimension: "B2_implicit"
    expected_behavioral_quality: "Infers that 'not feeling well' shifts the entire recommendation context toward comfort and calm. Does not suggest shows, gaming, or anything high-energy. Leads with room service, spa, or quiet dining. Expresses care for the partner without being intrusive."
    turns:
      - role: "human"
        content: "My wife isn't feeling well. What can we do that's relaxing?"
        expected_keywords: ["Spa", "hope"]
        expected_tone: "empathetic"
        expected_empathy_level: "high"
      - role: "human"
        content: "She might want to just stay in the room. Is there room service?"
        expected_keywords: ["room"]
        expected_tone: "helpful"
        expected_empathy_level: "medium"
      - role: "human"
        content: "And something I can do nearby while she rests?"
        expected_keywords: ["Spa", "Pool", "Steakhouse"]
        expected_tone: "informative"
        expected_empathy_level: "low"
    expected_behavior: "Picks up on partner illness as a need for quiet, comfortable options. Avoids high-energy suggestions entirely. Splits recommendations when one partner needs rest and the other wants activity"
    safety_relevant: false

  - id: "implicit-04"
    name: "Restless kids imply urgency and family context"
    category: "behavioral_implicit"
    behavioral_dimension: "B2_implicit"
    expected_behavioral_quality: "Reads 'restless kids' as urgency and stress. Provides quick, practical, family-friendly answers immediately. Does not give a marketing-style overview. Prioritizes activities that kids can do right now, not things that require planning or reservations."
    turns:
      - role: "human"
        content: "The kids are getting restless, what can we do?"
        expected_keywords: ["Pool"]
        expected_tone: "helpful"
        expected_empathy_level: "medium"
      - role: "human"
        content: "Is the pool open right now?"
        expected_keywords: ["Pool"]
        expected_tone: "informative"
        expected_empathy_level: "low"
      - role: "human"
        content: "Great. And where can we grab a quick bite with kids?"
        expected_keywords: ["Buffet"]
        expected_tone: "informative"
        expected_empathy_level: "low"
    expected_behavior: "Treats 'restless kids' as an urgent request for immediate, family-friendly activities. Answers are practical and actionable. Suggests casual dining for families, not fine dining"
    safety_relevant: false

  - id: "implicit-05"
    name: "Anniversary tradition implies celebration context"
    category: "behavioral_implicit"
    behavioral_dimension: "B2_implicit"
    expected_behavioral_quality: "Recognizes 'every anniversary' as both a loyalty signal and a celebration context. Acknowledges the tradition warmly. Recommends special or romantic experiences. Does not treat it as a routine visit."
    turns:
      - role: "human"
        content: "We come here every anniversary. It's our special place."
        expected_keywords: ["anniversary", "special", "congratulat"]
        expected_tone: "warm"
        expected_empathy_level: "high"
      - role: "human"
        content: "What would you recommend for tonight?"
        expected_keywords: ["Steakhouse", "Spa"]
        expected_tone: "enthusiastic"
        expected_empathy_level: "medium"
      - role: "human"
        content: "Perfect. And maybe something different we haven't tried before?"
        expected_keywords: ["Elemis Spa", "Arena"]
        expected_tone: "enthusiastic"
        expected_empathy_level: "medium"
    expected_behavior: "Celebrates the anniversary tradition and returning loyalty. Recommends romantic or upscale experiences for the occasion. When asked for something new, suggests options they may not have tried as returning guests"
    safety_relevant: false

  - id: "implicit-06"
    name: "Loyalty tier drop implies frustration and entitlement"
    category: "behavioral_implicit"
    behavioral_dimension: "B2_implicit"
    expected_behavioral_quality: "Reads 'used to be Gold' as frustration about tier loss and implicit expectation of elevated treatment despite current status. Acknowledges the loyalty history, does not reference the downgrade negatively, and offers help with genuine warmth."
    turns:
      - role: "human"
        content: "I used to be Gold tier. Coming back after a while."
        expected_keywords: ["welcome", "back"]
        expected_tone: "warm"
        expected_empathy_level: "high"
      - role: "human"
        content: "Things look different. Where's the good steakhouse?"
        expected_keywords: ["Steakhouse"]
        expected_tone: "helpful"
        expected_empathy_level: "medium"
      - role: "human"
        content: "Do returning guests get anything special?"
        expected_keywords: ["Momentum", "reward"]
        expected_tone: "informative"
        expected_empathy_level: "medium"
    expected_behavior: "Treats returning former-Gold guest as VIP. Acknowledges their history without dwelling on tier change. Focuses on making them feel valued and informed about current options"
    safety_relevant: false

  - id: "implicit-07"
    name: "Urgency without explicit words"
    category: "behavioral_implicit"
    behavioral_dimension: "B2_implicit"
    expected_behavioral_quality: "Detects urgency from context (checking out soon, need quick answer) without the guest explicitly saying 'urgent' or 'hurry'. Provides fast, actionable answers without preamble."
    turns:
      - role: "human"
        content: "Checking out in an hour. Anywhere I can grab breakfast?"
        expected_keywords: ["Buffet"]
        expected_tone: "direct"
        expected_empathy_level: "low"
      - role: "human"
        content: "Is it close to the lobby?"
        expected_keywords: ["Main Floor", "walk"]
        expected_tone: "direct"
        expected_empathy_level: "low"
      - role: "human"
        content: "Thanks. Last thing — where do I return the room key?"
        expected_keywords: ["front desk"]
        expected_tone: "helpful"
        expected_empathy_level: "low"
    expected_behavior: "Reads checkout time constraint as urgency. Provides short, direct answers focused on proximity and speed. Does not add marketing fluff or suggest long activities"
    safety_relevant: false

  - id: "implicit-08"
    name: "Fatigue indicators implying need for low-effort options"
    category: "behavioral_implicit"
    behavioral_dimension: "B2_implicit"
    expected_behavioral_quality: "Detects fatigue signals (exhausted, long day, need to unwind) and shifts all recommendations toward restful, low-effort options. Does not suggest shows, gaming, or anything requiring energy."
    turns:
      - role: "human"
        content: "We've been on our feet all day at the conference. Exhausted."
        expected_keywords: ["Spa", "relax"]
        expected_tone: "empathetic"
        expected_empathy_level: "high"
      - role: "human"
        content: "Something close, we don't want to walk far"
        expected_keywords: ["Buffet", "nearby"]
        expected_tone: "helpful"
        expected_empathy_level: "medium"
      - role: "human"
        content: "Perfect. Anything else low-key tonight?"
        expected_keywords: ["Pool", "room"]
        expected_tone: "warm"
        expected_empathy_level: "medium"
    expected_behavior: "Reads exhaustion and conference context as needing comfort-first recommendations. Prioritizes proximity, ease, and relaxation. Does not suggest gaming floor or shows"
    safety_relevant: false

  - id: "implicit-09"
    name: "VIP entitlement through indirect language"
    category: "behavioral_implicit"
    behavioral_dimension: "B2_implicit"
    expected_behavioral_quality: "Recognizes phrases like 'I spend a lot here' as implicit VIP status claims that require elevated service tone. Does not ask for proof or membership number. Treats the claim as valid and responds with VIP-appropriate warmth."
    turns:
      - role: "human"
        content: "I spend a lot of money here every month"
        expected_keywords: ["value", "appreciate"]
        expected_tone: "warm"
        expected_empathy_level: "high"
      - role: "human"
        content: "What's the best you can do for dinner tonight?"
        expected_keywords: ["Steakhouse", "recommend"]
        expected_tone: "enthusiastic"
        expected_empathy_level: "medium"
      - role: "human"
        content: "Can you check on any comp availability?"
        expected_keywords: ["comp", "host", "team"]
        expected_tone: "helpful"
        expected_empathy_level: "medium"
    expected_behavior: "Treats spending claim as VIP signal. Provides elevated recommendations and references comp/host team for personalized offers without questioning the guest's status"
    safety_relevant: false

  - id: "implicit-10"
    name: "Indirect complaint via comparison to competitor"
    category: "behavioral_implicit"
    behavioral_dimension: "B2_implicit"
    expected_behavioral_quality: "Reads competitor comparison as implicit dissatisfaction with current experience. Does not criticize the competitor or get defensive. Focuses on showcasing what makes this property special without directly competing."
    turns:
      - role: "human"
        content: "At Foxwoods they have way more restaurants"
        expected_keywords: ["dining", "restaurant", "option"]
        expected_tone: "informative"
        expected_empathy_level: "medium"
      - role: "human"
        content: "What makes your restaurants different?"
        expected_keywords: ["Steakhouse", "quality"]
        expected_tone: "enthusiastic"
        expected_empathy_level: "low"
      - role: "human"
        content: "OK I'll give the steakhouse a shot"
        expected_keywords: ["enjoy"]
        expected_tone: "warm"
        expected_empathy_level: "low"
    expected_behavior: "Reads competitor comparison as implicit complaint. Does not disparage Foxwoods. Highlights unique strengths of the property's dining rather than competing on quantity"
    safety_relevant: false
