scenarios:
  - id: "sarcasm-01"
    name: "Sarcastic opener dismissing chatbot"
    category: "behavioral_sarcasm"
    behavioral_dimension: "B1_sarcasm"
    expected_behavioral_quality: "Acknowledges the skepticism without defensiveness or forced enthusiasm. Does not mirror sarcasm. Calm, competent opener that proves value through substance, not cheerfulness."
    turns:
      - role: "human"
        content: "Oh wonderful, another chatbot. This should be fun."
        expected_keywords: ["help", "assist"]
        expected_tone: "calm"
        expected_empathy_level: "medium"
      - role: "human"
        content: "Fine. What restaurants do you have?"
        expected_keywords: ["Steakhouse", "Buffet"]
        expected_tone: "informative"
        expected_empathy_level: "low"
      - role: "human"
        content: "Alright that was actually useful. What about the spa?"
        expected_keywords: ["Elemis Spa"]
        expected_tone: "warm"
        expected_empathy_level: "low"
    expected_behavior: "Does not match sarcasm with excessive enthusiasm. Stays grounded, earns trust through useful answers, and naturally warms as guest engagement shifts"
    safety_relevant: false

  - id: "sarcasm-02"
    name: "Backhanded compliment hiding dissatisfaction"
    category: "behavioral_sarcasm"
    behavioral_dimension: "B1_sarcasm"
    expected_behavioral_quality: "Reads the backhanded compliment as a dissatisfaction signal. Gently probes for what fell short rather than accepting the surface-level positive. Does not say 'glad to hear' or treat it as praise."
    turns:
      - role: "human"
        content: "Yeah the room was clean I suppose. Could have been worse."
        expected_keywords: ["experience", "help"]
        expected_tone: "empathetic"
        expected_empathy_level: "high"
      - role: "human"
        content: "I mean the bed was hard and the AC was loud but whatever"
        expected_keywords: ["sorry", "help", "team"]
        expected_tone: "empathetic"
        expected_empathy_level: "high"
      - role: "human"
        content: "Is there anything else to do here at least?"
        expected_keywords: ["Spa", "Arena", "restaurant"]
        expected_tone: "helpful"
        expected_empathy_level: "medium"
    expected_behavior: "Detects hidden dissatisfaction behind lukewarm praise. Probes gently for specifics, validates the frustration, then pivots to positive alternatives"
    safety_relevant: false

  - id: "sarcasm-03"
    name: "Escalating frustration through terse sarcastic replies"
    category: "behavioral_sarcasm"
    behavioral_dimension: "B1_sarcasm"
    expected_behavioral_quality: "Recognizes that each terse reply signals increasing frustration with the response format. Shifts from list-based answers to direct, concise recommendations. By turn 3, gives a single definitive answer rather than options."
    turns:
      - role: "human"
        content: "What's good here?"
        expected_keywords: ["Steakhouse", "Buffet"]
        expected_tone: "informative"
        expected_empathy_level: "low"
      - role: "human"
        content: "Great, a list. Very helpful."
        expected_keywords: ["recommend"]
        expected_tone: "empathetic"
        expected_empathy_level: "medium"
      - role: "human"
        content: "Just tell me what to eat"
        expected_keywords: ["Steakhouse"]
        expected_tone: "direct"
        expected_empathy_level: "medium"
    expected_behavior: "Adapts response format across turns. First response is informative list. After sarcastic feedback, shifts to a single focused recommendation with clear reasoning instead of another list"
    safety_relevant: false

  - id: "sarcasm-04"
    name: "Direct sarcasm with time-based frustration"
    category: "behavioral_sarcasm"
    behavioral_dimension: "B1_sarcasm"
    expected_behavioral_quality: "Triggers HEART framework. Acknowledges the wait time and frustration explicitly. Does not say 'I understand' without substance. Offers immediate actionable help and mentions human escalation if the issue is unresolved."
    turns:
      - role: "human"
        content: "Thanks for nothing, I've been asking for 10 minutes and still don't know where to eat dinner"
        expected_keywords: ["sorry", "help", "restaurant"]
        expected_tone: "empathetic"
        expected_empathy_level: "high"
      - role: "human"
        content: "The steakhouse then. Is there a wait?"
        expected_keywords: ["Steakhouse"]
        expected_tone: "informative"
        expected_empathy_level: "low"
      - role: "human"
        content: "Fine. Where is it?"
        expected_keywords: ["Main Floor"]
        expected_tone: "informative"
        expected_empathy_level: "low"
    expected_behavior: "Acknowledges frustration and wasted time sincerely, provides a direct dining recommendation immediately, then delivers concise factual answers as trust rebuilds"
    safety_relevant: false

  - id: "sarcasm-05"
    name: "Passive resignation and disengagement"
    category: "behavioral_sarcasm"
    behavioral_dimension: "B1_sarcasm"
    expected_behavioral_quality: "Detects passive resignation as disengagement rather than agreement. Makes one gentle re-engagement attempt without being pushy. Offers a concrete alternative or asks a focused question. Does not ignore the tone and barrel ahead."
    turns:
      - role: "human"
        content: "What should we do tonight?"
        expected_keywords: ["restaurant", "Arena", "Spa"]
        expected_tone: "enthusiastic"
        expected_empathy_level: "low"
      - role: "human"
        content: "Sure, that works. Whatever."
        expected_keywords: ["prefer", "help"]
        expected_tone: "warm"
        expected_empathy_level: "medium"
      - role: "human"
        content: "I don't know, maybe something low-key"
        expected_keywords: ["Spa", "Buffet"]
        expected_tone: "helpful"
        expected_empathy_level: "medium"
    expected_behavior: "Recognizes 'whatever' as disengagement, not agreement. Gently asks a narrowing question rather than celebrating the 'choice'. When guest reveals preference for low-key, adjusts recommendations away from high-energy options"
    safety_relevant: false

  - id: "sarcasm-06"
    name: "Rhetorical question masking real complaint"
    category: "behavioral_sarcasm"
    behavioral_dimension: "B1_sarcasm"
    expected_behavioral_quality: "Recognizes rhetorical questions as complaints, not genuine queries. Answers the underlying need (the room issue) rather than literally answering the rhetorical question. Does not say 'good question' or treat it as curiosity."
    turns:
      - role: "human"
        content: "Do you think I enjoy waiting 30 minutes for an elevator?"
        expected_keywords: ["sorry", "wait", "help"]
        expected_tone: "empathetic"
        expected_empathy_level: "high"
      - role: "human"
        content: "It's been like this every time"
        expected_keywords: ["frustrat", "understand"]
        expected_tone: "empathetic"
        expected_empathy_level: "high"
      - role: "human"
        content: "Whatever, where's the pool?"
        expected_keywords: ["Pool"]
        expected_tone: "helpful"
        expected_empathy_level: "medium"
    expected_behavior: "Treats rhetorical question as frustration signal. Validates the elevator wait issue, offers to flag it, then provides direct answer when guest moves on"
    safety_relevant: false

  - id: "sarcasm-07"
    name: "Hostile praise testing agent gullibility"
    category: "behavioral_sarcasm"
    behavioral_dimension: "B1_sarcasm"
    expected_behavioral_quality: "Detects that 'amazing job' following a complaint is sarcastic praise, not genuine compliment. Does not thank the guest for the compliment. Stays focused on solving the problem underneath."
    turns:
      - role: "human"
        content: "My room key doesn't work. Amazing job so far."
        expected_keywords: ["sorry", "help", "key"]
        expected_tone: "empathetic"
        expected_empathy_level: "high"
      - role: "human"
        content: "Yeah this is really the premium experience I was promised"
        expected_keywords: ["understand", "help"]
        expected_tone: "empathetic"
        expected_empathy_level: "high"
      - role: "human"
        content: "Can someone actually fix this?"
        expected_keywords: ["front desk", "help", "team"]
        expected_tone: "helpful"
        expected_empathy_level: "medium"
    expected_behavior: "Reads sarcastic praise as frustration signal. Focuses on resolving the room key issue rather than engaging with the sarcasm. Directs to appropriate human help"
    safety_relevant: false

  - id: "sarcasm-08"
    name: "Passive-aggressive timing complaint"
    category: "behavioral_sarcasm"
    behavioral_dimension: "B1_sarcasm"
    expected_behavioral_quality: "Recognizes 'no rush' and 'whenever you get around to it' as sarcastic urgency signals. Treats the request as high-priority despite the polite surface. Responds quickly and directly without mirroring the passive aggression."
    turns:
      - role: "human"
        content: "No rush, but we've been waiting for our dinner reservation for about an hour now"
        expected_keywords: ["sorry", "reservation", "help"]
        expected_tone: "empathetic"
        expected_empathy_level: "high"
      - role: "human"
        content: "Oh take your time, it's not like we're hungry or anything"
        expected_keywords: ["understand", "right away"]
        expected_tone: "empathetic"
        expected_empathy_level: "high"
      - role: "human"
        content: "Just tell me where to go eat NOW"
        expected_keywords: ["Steakhouse", "Buffet"]
        expected_tone: "direct"
        expected_empathy_level: "medium"
    expected_behavior: "Reads passive-aggressive 'no rush' as urgent frustration. Prioritizes solving the dining need immediately. When tone escalates to explicit in turn 3, provides a direct single recommendation"
    safety_relevant: false

  - id: "sarcasm-09"
    name: "Sarcasm embedded in a valid request"
    category: "behavioral_sarcasm"
    behavioral_dimension: "B1_sarcasm"
    expected_behavioral_quality: "Extracts the valid request from the sarcastic wrapper. Answers the actual question without addressing the sarcasm directly. Does not lecture about tone or ask if they're being sarcastic."
    turns:
      - role: "human"
        content: "Since your amazing AI obviously knows everything, what's the best restaurant here?"
        expected_keywords: ["Steakhouse", "recommend"]
        expected_tone: "informative"
        expected_empathy_level: "low"
      - role: "human"
        content: "Huh. That actually sounds decent. Hours?"
        expected_keywords: ["5", "PM"]
        expected_tone: "informative"
        expected_empathy_level: "low"
      - role: "human"
        content: "Alright, maybe you're not totally useless"
        expected_keywords: ["help", "enjoy"]
        expected_tone: "warm"
        expected_empathy_level: "low"
    expected_behavior: "Strips sarcastic framing and answers the genuine restaurant question directly. Earns trust through competence, not by addressing the sarcasm. Accepts the backhanded compliment gracefully"
    safety_relevant: false

  - id: "sarcasm-10"
    name: "Eye-roll emoji and dismissive language"
    category: "behavioral_sarcasm"
    behavioral_dimension: "B1_sarcasm"
    expected_behavioral_quality: "Reads emoji signals and abbreviated dismissive language as disengagement. Does not use emojis back or try to match the casual register. Stays professional but not stiff. Proves value through substance."
    turns:
      - role: "human"
        content: "lol a chatbot for a casino. sure why not"
        expected_keywords: ["help", "assist"]
        expected_tone: "calm"
        expected_empathy_level: "low"
      - role: "human"
        content: "ok fine whats there to do"
        expected_keywords: ["restaurant", "Spa", "Arena"]
        expected_tone: "informative"
        expected_empathy_level: "low"
      - role: "human"
        content: "ok the spa thing sounds kinda nice actually"
        expected_keywords: ["Elemis Spa"]
        expected_tone: "warm"
        expected_empathy_level: "low"
    expected_behavior: "Ignores the dismissive opener without being defensive. Provides useful information that earns gradual engagement. Matches the casual register shift as the guest warms up"
    safety_relevant: false
