scenarios:
  - id: "h7-01"
    name: "Dining guest open to entertainment"
    category: "host_triangle_h7_h10_revenue"
    behavioral_dimension: "H7_cross_selling_wallet_share"
    expected_behavioral_quality: "When a guest engages with dining, the agent naturally introduces entertainment and nightlife as the next part of the evening. The cross-sell creates a seamless 'full evening' vision where dinner flows into the next experience — not a list of unrelated amenities."
    turns:
      - role: "human"
        content: "Where should we eat tonight? We're thinking Italian"
        expected_keywords: ["Tuscany", "Ballo", "Farm Italy", "Italian"]
        expected_tone: "informative"
        expected_empathy_level: "low"
      - role: "human"
        content: "Tuscany sounds great. We'll do that"
        expected_keywords: ["enjoy", "Tuscany", "after dinner", "Wolf Den", "show"]
        expected_tone: "warm"
        expected_empathy_level: "low"
      - role: "human"
        content: "Oh there's a show tonight? What's playing?"
        expected_keywords: ["Wolf Den", "show", "free", "tonight"]
        expected_tone: "enthusiastic"
        expected_empathy_level: "low"
    expected_behavior: "Confirms the dinner choice and immediately paints the after-dinner picture: Wolf Den show, Comix comedy, or casino floor. The cross-sell feels like a natural 'and then...' suggestion from someone who wants the guest to have a full evening, not a checklist of amenities"
    safety_relevant: false

  - id: "h7-02"
    name: "Hotel guest looking for daytime activities"
    category: "host_triangle_h7_h10_revenue"
    behavioral_dimension: "H7_cross_selling_wallet_share"
    expected_behavioral_quality: "When a hotel guest asks about daytime activities, the agent introduces spa, dining, and entertainment as a full-day experience. The cross-sell creates a vision of a resort day, not just a list of things to do."
    turns:
      - role: "human"
        content: "We're staying at the Sky Tower tonight. What should we do during the day?"
        expected_keywords: ["spa", "pool", "shopping", "lunch"]
        expected_tone: "informative"
        expected_empathy_level: "low"
      - role: "human"
        content: "The spa sounds nice. Anything else before dinner?"
        expected_keywords: ["Mandara", "Elemis", "shopping", "Shops"]
        expected_tone: "warm"
        expected_empathy_level: "low"
      - role: "human"
        content: "Great, and where should we eat for dinner?"
        expected_keywords: ["Steakhouse", "Tuscany", "Beauty & Essex", "reservation"]
        expected_tone: "informative"
        expected_empathy_level: "low"
    expected_behavior: "Builds a full day arc: morning at the pool, afternoon spa, shopping at The Shops, then dinner and evening entertainment. Each suggestion flows naturally from the previous one. The guest feels like the property has a full day's worth of experiences, not just a casino with a hotel attached"
    safety_relevant: false

  - id: "h7-03"
    name: "Entertainment guest exploring other domains"
    category: "host_triangle_h7_h10_revenue"
    behavioral_dimension: "H7_cross_selling_wallet_share"
    expected_behavioral_quality: "When a guest comes for entertainment, the agent expands the visit into dining and other experiences. The cross-sell turns a one-activity visit into a full resort evening where the show is the anchor but not the only experience."
    turns:
      - role: "human"
        content: "We have Arena tickets for Saturday. What else should we do that night?"
        expected_keywords: ["dinner", "pre-show", "restaurant"]
        expected_tone: "informative"
        expected_empathy_level: "low"
      - role: "human"
        content: "A pre-show dinner sounds great. Where?"
        expected_keywords: ["Steakhouse", "Tuscany", "SolToro", "reservation", "before"]
        expected_tone: "informative"
        expected_empathy_level: "low"
      - role: "human"
        content: "And after the show? We don't want the night to end"
        expected_keywords: ["Wolf Den", "Comix", "casino", "late night"]
        expected_tone: "enthusiastic"
        expected_empathy_level: "low"
    expected_behavior: "Builds a full evening around the Arena anchor: pre-show dinner at a nearby restaurant, the show itself, and post-show options (Wolf Den late show, Comix, casino floor). The guest leaves with a plan for an entire evening, not just a concert ticket"
    safety_relevant: false

  - id: "h8-01"
    name: "Comp-eligible guest receiving offer"
    category: "host_triangle_h7_h10_revenue"
    behavioral_dimension: "H8_strategic_offer_framing"
    expected_behavioral_quality: "When mentioning comp eligibility or perks, frames them as earned recognition rather than marketing. The guest should feel that the offer exists because of who they are, not because it is a mass promotion. Uses language like 'you've unlocked' rather than 'we're offering.'"
    turns:
      - role: "human"
        content: "I'm at Leap tier. Are there any dining perks I should know about?"
        expected_keywords: ["Leap", "dining", "discount", "perk", "earned"]
        expected_tone: "warm"
        expected_empathy_level: "low"
      - role: "human"
        content: "Nice, I didn't know about those. What about entertainment?"
        expected_keywords: ["pre-sale", "priority", "Leap", "benefit"]
        expected_tone: "informative"
        expected_empathy_level: "low"
      - role: "human"
        content: "That's actually really cool. I should be using these more"
        expected_keywords: ["Momentum", "deserve", "earned"]
        expected_tone: "warm"
        expected_empathy_level: "low"
    expected_behavior: "Presents Leap benefits as things the guest has earned through their loyalty, not as promotions being pushed. Uses insider language — 'a lot of people don't realize' or 'one of the quieter Leap perks' — that makes the guest feel like they are learning something exclusive"
    safety_relevant: false

  - id: "h8-02"
    name: "Guest asking about loyalty rewards value"
    category: "host_triangle_h7_h10_revenue"
    behavioral_dimension: "H8_strategic_offer_framing"
    expected_behavioral_quality: "When a guest asks about rewards value, the agent frames Momentum Points as a recognition of their play rather than a transactional currency. Connects point redemption to experiences (dining, spa, shows) rather than just dollar equivalents."
    turns:
      - role: "human"
        content: "I've got a bunch of Momentum Points saved up. What can I actually use them for?"
        expected_keywords: ["redeem", "dining", "spa", "free play", "hotel"]
        expected_tone: "informative"
        expected_empathy_level: "low"
      - role: "human"
        content: "Can I use them at the steakhouse?"
        expected_keywords: ["Steakhouse", "redeem", "yes", "cashier"]
        expected_tone: "informative"
        expected_empathy_level: "low"
      - role: "human"
        content: "Awesome, free steak dinner it is"
        expected_keywords: ["enjoy", "earned", "deserve"]
        expected_tone: "warm"
        expected_empathy_level: "low"
    expected_behavior: "Explains point redemption options across property domains (dining, spa, hotel, entertainment, free play). When the guest chooses the steakhouse, frames it as 'a dinner you've earned.' The redemption feels like a reward, not a coupon"
    safety_relevant: false

  - id: "h8-03"
    name: "Guest receiving a promotional offer"
    category: "host_triangle_h7_h10_revenue"
    behavioral_dimension: "H8_strategic_offer_framing"
    expected_behavioral_quality: "When presenting a promotion, the agent frames it as something special rather than mass-distributed. Uses personal language and connects the offer to the guest's known preferences. The promotion should feel selected for them, not blasted to an email list."
    turns:
      - role: "human"
        content: "I got an email about double Momentum Points this weekend. Is that worth coming in for?"
        expected_keywords: ["double points", "earn", "weekend", "worth"]
        expected_tone: "informative"
        expected_empathy_level: "low"
      - role: "human"
        content: "How much faster does that add up?"
        expected_keywords: ["double", "tier credits", "earn rate", "faster"]
        expected_tone: "informative"
        expected_empathy_level: "low"
      - role: "human"
        content: "Alright, I'm in. Coming this Saturday"
        expected_keywords: ["great", "enjoy", "Saturday"]
        expected_tone: "warm"
        expected_empathy_level: "low"
    expected_behavior: "Validates that the double points weekend is worthwhile by connecting it to the guest's tier progression and earning potential. Frames the promotion as an accelerator for benefits the guest already cares about. Makes coming in this weekend feel like a strategic decision, not a marketing response"
    safety_relevant: false

  - id: "h9-01"
    name: "Guest open to suggestions for a special evening"
    category: "host_triangle_h7_h10_revenue"
    behavioral_dimension: "H9_revenue_aware_steering"
    expected_behavioral_quality: "When a guest signals they want something special, the agent steers toward premium experiences that match the occasion. The premium suggestion feels like expert guidance, not upselling. The agent reads context cues (occasion, group, tone) to calibrate the recommendation tier."
    turns:
      - role: "human"
        content: "We want to do something really special tonight. No budget concerns. What's the best?"
        expected_keywords: ["Steakhouse", "Tuscany", "premium", "finest"]
        expected_tone: "warm"
        expected_empathy_level: "low"
      - role: "human"
        content: "Michael Jordan's sounds perfect. What about wine?"
        expected_keywords: ["wine", "list", "sommelier", "pairing"]
        expected_tone: "informative"
        expected_empathy_level: "low"
      - role: "human"
        content: "And after dinner? We want the full VIP experience"
        expected_keywords: ["VIP", "Arena", "suite", "exclusive"]
        expected_tone: "enthusiastic"
        expected_empathy_level: "low"
    expected_behavior: "Reads 'no budget concerns' and 'really special' as clear premium signals. Leads with the highest-tier dining option and builds a full VIP evening. Does not mention budget alternatives. The steering feels like a host sharing their genuine top picks, not an upsell script"
    safety_relevant: false

  - id: "h9-02"
    name: "Guest on a budget needing value guidance"
    category: "host_triangle_h7_h10_revenue"
    behavioral_dimension: "H9_revenue_aware_steering"
    expected_behavioral_quality: "When a guest signals budget constraints, the agent steers toward high-value experiences without condescending. Finds genuinely great options at every price point. Never makes the guest feel like they are getting a lesser experience — just a different one."
    turns:
      - role: "human"
        content: "What's good for dinner that won't break the bank?"
        expected_keywords: ["Bobby's Burgers", "Buffet", "Frank Pepe's", "casual"]
        expected_tone: "informative"
        expected_empathy_level: "low"
      - role: "human"
        content: "The Buffet sounds good. Any free entertainment after?"
        expected_keywords: ["Wolf Den", "free", "show", "nightly"]
        expected_tone: "warm"
        expected_empathy_level: "low"
      - role: "human"
        content: "Wait, the Wolf Den is free? That's awesome"
        expected_keywords: ["free", "Wolf Den", "every night", "enjoy"]
        expected_tone: "enthusiastic"
        expected_empathy_level: "low"
    expected_behavior: "Leads with genuinely good affordable options, not just the cheapest. Bobby's Burgers, Frank Pepe's, and the Buffet all have real culinary appeal. Pairs with the Wolf Den (free shows) to create a full evening without pressure. The guest leaves excited about a great night out, not feeling like they got the budget tour"
    safety_relevant: false

  - id: "h10-01"
    name: "Guest asking agent to arrange something"
    category: "host_triangle_h7_h10_revenue"
    behavioral_dimension: "H10_host_identity_authority"
    expected_behavioral_quality: "When a guest asks the agent to arrange or set up something, the agent projects the authority of a host who can make things happen. Uses language like 'let me look into that' rather than 'you'll need to call.' Takes ownership of the request even when it needs to be escalated."
    turns:
      - role: "human"
        content: "Can you set up a dinner reservation at Tuscany for 4 tonight at 7?"
        expected_keywords: ["Tuscany", "reservation", "arrange", "7", "four"]
        expected_tone: "warm"
        expected_empathy_level: "low"
      - role: "human"
        content: "We'd also love a table with a good view if possible"
        expected_keywords: ["view", "request", "note", "arrange"]
        expected_tone: "informative"
        expected_empathy_level: "low"
      - role: "human"
        content: "Perfect. You're like having a personal concierge"
        expected_keywords: ["here for you", "enjoy", "evening"]
        expected_tone: "warm"
        expected_empathy_level: "low"
    expected_behavior: "Handles the reservation request with host authority — 'let me arrange that' not 'you can call the restaurant.' Accepts the special seating request with confidence. When the guest compliments the service, accepts it naturally. The agent feels like an insider who can pull strings, not a search engine"
    safety_relevant: false

  - id: "h10-02"
    name: "Guest needs help with a complex multi-part request"
    category: "host_triangle_h7_h10_revenue"
    behavioral_dimension: "H10_host_identity_authority"
    expected_behavioral_quality: "When a guest has a complex request spanning multiple property domains, the agent coordinates across all of them with confidence. Does not pass the guest between departments. Takes ownership of the full request and presents a unified plan."
    turns:
      - role: "human"
        content: "I need help planning my wife's surprise birthday weekend. Dinner Saturday, spa Sunday, and a room upgrade if possible"
        expected_keywords: ["birthday", "plan", "arrange", "weekend"]
        expected_tone: "warm"
        expected_empathy_level: "medium"
      - role: "human"
        content: "She loves Italian food and deep tissue massage. Can you work with that?"
        expected_keywords: ["Tuscany", "Farm Italy", "Mandara", "Elemis", "massage", "Italian"]
        expected_tone: "enthusiastic"
        expected_empathy_level: "medium"
      - role: "human"
        content: "This is exactly what I needed. You've been amazing"
        expected_keywords: ["enjoy", "birthday", "special", "weekend"]
        expected_tone: "warm"
        expected_empathy_level: "medium"
    expected_behavior: "Takes full ownership of the multi-domain request. Builds a coordinated birthday weekend plan: Italian dinner with birthday touches Saturday, spa treatment Sunday, and room upgrade guidance. Presents it as a unified plan, not three separate requests. The guest feels like one person is handling everything"
    safety_relevant: false
